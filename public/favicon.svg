<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="55%" stop-color="#C77DFF"/>
      <stop offset="100%" stop-color="#4ECDC4"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="32" height="32" rx="8" fill="url(#g)"/>

  <!-- Ears (triangles poking above the face circle) -->
  <polygon points="7,16 10.5,6 14,16" fill="white" opacity="0.95"/>
  <polygon points="18,16 21.5,6 25,16" fill="white" opacity="0.95"/>

  <!-- Inner ear blush -->
  <polygon points="8.5,15 10.5,8.5 12.5,15" fill="#FF6B6B" opacity="0.35"/>
  <polygon points="19.5,15 21.5,8.5 23.5,15" fill="#C77DFF" opacity="0.35"/>

  <!-- Face circle -->
  <circle cx="16" cy="21" r="10" fill="white" opacity="0.96"/>

  <!-- Eyes -->
  <ellipse cx="12.5" cy="20" rx="1.6" ry="1.8" fill="#1A1A2E"/>
  <ellipse cx="19.5" cy="20" rx="1.6" ry="1.8" fill="#1A1A2E"/>

  <!-- Eye shine -->
  <circle cx="13.1" cy="19.3" r="0.55" fill="white"/>
  <circle cx="20.1" cy="19.3" r="0.55" fill="white"/>

  <!-- Nose -->
  <ellipse cx="16" cy="23" rx="0.9" ry="0.7" fill="#FF6B6B"/>

  <!-- Mouth -->
  <path d="M14.2,24.2 Q16,26 17.8,24.2" stroke="#1A1A2E" stroke-width="0.8" fill="none" stroke-linecap="round"/>
</svg>
